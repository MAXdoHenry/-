{% extends "base.html" %}

{% block title %}新建群聊 - 医联体分级会诊系统{% endblock %}

{% block content %}
<div class="page-card p-3 p-md-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 medical-title mb-0">新建群聊</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('groups') }}">返回群聊</a>
    </div>
    <form method="post">
        <div class="mb-3">
            <label class="form-label">群名称</label>
            <input class="form-control" name="group_name" required placeholder="请输入群名称">
        </div>
        <div class="mb-3">
            <label class="form-label">群类型</label>
            <select class="form-select" name="group_type">
                {% for value, label in group_type_labels.items() %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">群简介</label>
            <textarea class="form-control" name="description" rows="3" placeholder="请输入群聊用途"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">选择好友</label>
            <div class="border rounded p-3 bg-light">
                {% for friend in friends %}
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="member_ids" value="{{ friend.id }}" id="friend_{{ friend.id }}">
                    <label class="form-check-label" for="friend_{{ friend.id }}">
                        {{ friend.name }}｜{{ friend.title }}｜{{ friend.hospital_name }}｜{{ friend.department }}
                    </label>
                </div>
                {% else %}
                <p class="text-secondary mb-0">暂无好友，请先添加好友。</p>
                {% endfor %}
            </div>
        </div>
        <button class="btn btn-primary" type="submit">创建</button>
    </form>
</div>
{% endblock %}
