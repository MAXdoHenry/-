{% extends "base.html" %}

{% block title %}好友分组 - 医联体分级会诊系统{% endblock %}

{% block content %}
<div class="page-card p-3 p-md-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 medical-title mb-0">好友分组管理</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('friends') }}">返回好友</a>
    </div>
    <form method="post" class="row g-2 mb-4">
        <div class="col-12 col-md-9">
            <input class="form-control" name="group_name" placeholder="例如：科室同事、医联体专家、学术同行">
        </div>
        <div class="col-12 col-md-3">
            <button class="btn btn-primary w-100" type="submit">新增分组</button>
        </div>
    </form>
    <div class="list-group">
        {% for group in friend_groups %}
        <div class="list-group-item">{{ group.group_name }}</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
