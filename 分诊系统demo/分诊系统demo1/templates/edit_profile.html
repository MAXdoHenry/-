{% extends "base.html" %}

{% block title %}填写个人信息 - 医联体分级会诊系统{% endblock %}
{% block page_title %}个人信息{% endblock %}
{% block header_actions %}
<a class="icon-button" href="{{ url_for('me') }}" title="返回">‹</a>
{% endblock %}

{% block content %}
<div class="page-card p-3 p-md-4">
    <h1 class="h4 medical-title mb-3">填写个人信息</h1>
    <div class="alert alert-info small">
        医院和角色由系统预设，个人页只维护实名展示资料，便于好友、群聊和会诊协作时识别身份。
    </div>

    <form method="post">
        <div class="mb-3">
            <label class="form-label">真实姓名 <span class="text-danger">*</span></label>
            <input class="form-control" name="name" value="{{ current_user.name }}" required maxlength="30">
        </div>
        <div class="mb-3">
            <label class="form-label">所属医院</label>
            <input class="form-control" value="{{ current_user.hospital_name }}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">科室</label>
            <input class="form-control" name="department" value="{{ current_user.department }}" maxlength="30" placeholder="例如：心内科、骨科、全科">
        </div>
        <div class="mb-3">
            <label class="form-label">职称</label>
            <input class="form-control" name="title" value="{{ current_user.title }}" maxlength="30" placeholder="例如：主任医师、主治医师、住院医师">
        </div>
        <div class="mb-3">
            <label class="form-label">手机号</label>
            <input class="form-control" name="phone" value="{{ current_user.phone }}" maxlength="30" placeholder="用于搜索加好友">
        </div>
        <div class="mb-3">
            <label class="form-label">微信号</label>
            <input class="form-control" name="wechat_id" value="{{ current_user.wechat_id }}" maxlength="30" placeholder="用于搜索加好友">
        </div>
        <div class="mb-3">
            <label class="form-label">头像文字</label>
            <input class="form-control" name="avatar" value="{{ current_user.avatar }}" maxlength="2" placeholder="例如：赵">
            <div class="form-text">演示版使用文字头像，最多 2 个字。</div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">保存个人信息</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('me') }}">取消</a>
        </div>
    </form>
</div>
{% endblock %}
