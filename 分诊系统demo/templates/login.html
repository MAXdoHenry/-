{% extends "base.html" %}

{% block title %}登录 - 医联体分级会诊系统{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 78vh;">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="page-card p-4 p-md-5">
            <div class="text-center mb-4">
                <h1 class="h3 medical-title mb-2">医联体分级会诊系统</h1>
                <p class="text-secondary mb-0">疑难病例分级请教与回复</p>
            </div>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">医生姓名</label>
                    <input class="form-control form-control-lg" name="name" placeholder="例如：赵医生" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input class="form-control form-control-lg" name="password" type="password" placeholder="请输入密码" required>
                </div>
                <button class="btn btn-primary btn-lg w-100" type="submit">登录</button>
                <p class="text-center text-secondary small mt-3 mb-0">演示账号密码均为 123456</p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
